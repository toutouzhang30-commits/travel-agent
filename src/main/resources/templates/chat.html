<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>旅游 AI 助手 - MVP</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; overscroll-behavior: none; }
        #left-panel { width: 52%; height: 100vh; display: flex; flex-direction: column; border-right: 2px solid #ccc; min-height: 0; overflow: hidden; overscroll-behavior: contain; }
        #right-panel { width: 48%; height: 100vh; padding: 12px; display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; min-height: 0; overflow-y: auto; overscroll-behavior: contain; }
        h3 { margin: 0; }

        #message-list { flex: 1; min-height: 0; overflow-y: auto; overscroll-behavior: contain; padding: 10px; border-bottom: 1px solid #eee; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 4px; white-space: pre-wrap; }
        .user-msg { background: #e3f2fd; align-self: flex-end; }
        .ai-msg { background: #f5f5f5; }

        #status-area { min-height: 30px; padding: 5px 10px; font-size: 0.9em; color: #666; font-style: italic; }

        #input-area { padding: 15px; display: flex; gap: 10px; }
        #user-input { flex: 1; padding: 8px; }

        #itinerary-display { border: 2px dashed #bbb; padding: 18px; height: 540px; min-height: 260px; max-height: 78vh; flex: 0 0 auto; overflow-y: auto; overscroll-behavior: contain; background: #fff; }
        #itinerary-resizer { height: 10px; flex: 0 0 auto; cursor: ns-resize; border-radius: 4px; background: linear-gradient(to bottom, transparent 0 3px, #c9d1d9 3px 5px, transparent 5px); }
        #itinerary-resizer:hover { background: linear-gradient(to bottom, transparent 0 3px, #0969da 3px 5px, transparent 5px); }
        #event-log-area, #retrieval-area, #tool-area, #source-area { border: 1px solid #ddd; padding: 10px; font-size: 0.8em; color: #888; background: #fff; flex-shrink: 0; }
        #event-log-area, #retrieval-area, #tool-area, #source-area { overscroll-behavior: contain; }
        #event-log-area { max-height: 78px; overflow-y: auto; color: #666; }
        #retrieval-area, #tool-area { max-height: 64px; overflow-y: auto; }
        #source-area { max-height: 96px; overflow-y: auto; }
        .event-log-item { padding: 5px 0; border-bottom: 1px dashed #e5e5e5; line-height: 1.4; }
        .event-log-item:last-child { border-bottom: 0; }
        .event-log-time { color: #999; margin-right: 6px; }
        .event-log-label { color: #333; font-weight: 600; margin-right: 6px; }
        .source-badge {
            display: inline-block;
            margin: 0 4px 4px 0;
            padding: 2px 6px;
            border: 1px solid #d0d7de;
            border-radius: 4px;
            color: #1f2328;
            background: #f6f8fa;
            font-size: 0.85em;
            font-weight: 600;
        }
        .tool-card {
            border-left: 4px solid #8c959f;
            padding: 8px 10px;
            background: #f6f8fa;
            color: #1f2328;
            line-height: 1.45;
        }
        .tool-card-running { border-left-color: #0969da; }
        .tool-card-success { border-left-color: #1a7f37; }
        .tool-card-failed { border-left-color: #cf222e; }
        .tool-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .tool-card-state {
            padding: 1px 6px;
            border-radius: 4px;
            background: #fff;
            border: 1px solid #d0d7de;
            font-size: 0.85em;
            font-weight: 600;
        }
        .tool-card-summary { color: #24292f; }
        .tool-card-meta {
            margin-top: 4px;
            color: #57606a;
            font-size: 0.92em;
        }
        .itinerary-card {
            background: #fff;
            border-radius: 8px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            color: #24292f;
        }
        .itinerary-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            border-bottom: 1px solid #d0d7de;
            margin-bottom: 14px;
            padding-bottom: 10px;
        }
        .itinerary-header h2 {
            margin: 0 0 6px;
            color: #0969da;
            font-size: 1.35rem;
            line-height: 1.25;
        }
        .itinerary-header p {
            margin: 0;
            color: #57606a;
        }
        .itinerary-evidence-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 10px;
            margin: 0 0 16px;
        }
        .itinerary-evidence-panel {
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 10px;
            background: #f6f8fa;
        }
        .evidence-title {
            color: #1f2328;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .evidence-item {
            border-top: 1px dashed #d0d7de;
            padding-top: 8px;
            margin-top: 8px;
            line-height: 1.45;
        }
        .evidence-item:first-of-type {
            border-top: 0;
            padding-top: 0;
            margin-top: 0;
        }
        .evidence-summary {
            color: #24292f;
            font-size: 0.88rem;
        }
        .evidence-meta {
            margin-top: 4px;
            color: #57606a;
            font-size: 0.78rem;
        }
        .itinerary-day {
            margin-bottom: 20px;
            border-left: 4px solid #0969da;
            padding-left: 15px;
        }
        .itinerary-day h4 {
            margin: 10px 0;
            color: #1f2328;
        }
        .itinerary-slot {
            margin-bottom: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .slot-title {
            color: #3a3a3a;
            font-weight: 700;
        }
        .slot-note {
            color: #57606a;
            font-size: 0.88rem;
            margin-top: 2px;
        }
        .slot-route {
            color: #1f6feb;
            font-size: 0.88rem;
            margin-top: 2px;
            line-height: 1.45;
        }
        .slot-budget {
            color: #0969da;
            font-size: 0.88rem;
            margin-top: 2px;
        }
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            #left-panel, #right-panel { width: 100%; height: auto; min-height: 50vh; }
            #right-panel { overflow: visible; }
            #itinerary-display { height: 520px; min-height: 320px; max-height: none; }
        }
    </style>
</head>
<body>

<div id="left-panel">
    <div id="message-list">
        <div class="message ai-msg">您好！我是您的旅游 AI 助手。请告诉我您想去哪里？</div>
    </div>

    <div id="status-area">等待指令...</div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="输入您的旅行计划，例如：去杭州玩3天" autocomplete="off">
        <button id="send-btn">发送</button>
    </div>
</div>

<div id="right-panel">
    <h3>当前行程方案</h3>
    <div id="itinerary-display">
        <p style="color: #999;">暂无生成的行程</p>
    </div>
    <div id="itinerary-resizer" title="拖动调整行程方案高度"></div>

    <h3>执行过程</h3>
    <div id="event-log-area">
        等待执行步骤...
    </div>

    <h3>检索状态</h3>
    <div id="retrieval-area">
        尚未触发知识检索...
    </div>

    <h3>工具调用状态</h3>
    <div id="tool-area">
        尚未触发工具调用...
    </div>

    <h3>信息来源</h3>
    <div id="source-area">
        Phase 4 接入工具后将在此展示参考文档与工具来源...
    </div>
</div>

<script th:src="@{/js/chat.js}"></script>
</body>
</html>
